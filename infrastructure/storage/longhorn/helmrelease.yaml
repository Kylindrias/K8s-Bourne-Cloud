apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn-release
  namespace: longhorn-system
spec:
  chart:
    spec:
      chart: longhorn
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: longhorn-repo
      version: 1.11.0
  interval: 1m0s
  # Turn off default disk
  values:
    defaultSettings:
      backupTarget: nfs://192.168.1.10:/mnt/storage-zfs/k8s-longhorn-backup

### Use this to separate worker/CP nodes for Longhorn storage. No need to use now with untainted CPs.

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pvs-shared
  namespace: flux-system
spec:
  interval: 5m
  path: ../../infrastructure/storage/pvs
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn: 
    - name: storage
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pvs-lan
  namespace: flux-system
spec:
  interval: 5m
  path: ../../infrastructure/storage/pvs/lan
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn: 
    - name: storage
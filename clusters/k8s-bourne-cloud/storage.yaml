apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: storage
  namespace: flux-system
spec:
  interval: 5m
  path: ../../infrastructure/storage
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn: 
    - name: namespaces-lan
    - name: namespaces-shared
    - name: repos
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nfs-storageclass-lan
  namespace: flux-system
spec:
  interval: 5m
  path: ../../infrastructure/storage/csi-nfs/lan
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn: 
    - name: storage
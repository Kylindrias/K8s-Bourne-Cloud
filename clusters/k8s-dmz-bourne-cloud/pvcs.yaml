apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pvcs-dmz
  namespace: flux-system
spec:
  interval: 5m
  path: ../../infrastructure/storage/pvcs/dmz
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn: 
    - name: pvs-dmz
    - name: pvs-shared
    - name: storage
    - name: nfs-storageclass-dmz
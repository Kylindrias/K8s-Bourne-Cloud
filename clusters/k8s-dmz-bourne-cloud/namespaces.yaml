apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: namespaces-shared
  namespace: flux-system
spec:
  interval: 5m
  path: ../../infrastructure/namespaces/shared
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: namespaces-dmz
  namespace: flux-system
spec:
  interval: 5m
  path: ../../infrastructure/namespaces/dmz
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
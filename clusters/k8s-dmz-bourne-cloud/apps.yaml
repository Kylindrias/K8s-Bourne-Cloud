apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-shared
  namespace: flux-system
spec:
  interval: 5m
  path: ../../apps/shared
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: pvcs-shared
    - name: secrets
    - name: repos
    - name: longhorn
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-dmz
  namespace: flux-system
spec:
  interval: 5m
  path: ../../apps/dmz
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: pvcs-dmz
    - name: secrets-dmz
    - name: repos
    - name: longhorn
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo
  namespace: odoo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: odoo
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: odoo
    spec:
      securityContext:
        fsGroup: 101
      containers:
        - name: odoo
          image: odoo:17.0
          command: ["odoo"]
          args: ["--init", "base", "--without-demo", "all"]
          ports:
            - containerPort: 8069
            - containerPort: 8072
          env:
            - name: HOST
              valueFrom:
                secretKeyRef:
                  name: odoo-db-app
                  key: host
            - name: USER
              valueFrom:
                secretKeyRef:
                  name: odoo-db-app
                  key: username
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-db-app
                  key: password
            - name: ADMIN_PASSWD          # Odoo master password
              valueFrom:
                secretKeyRef:
                  name: odoo-master
                  key: admin_passwd
          volumeMounts:
            - name: filestore
              mountPath: /var/lib/odoo
      volumes:
        - name: filestore
          persistentVolumeClaim:
            claimName: odoo-filestore
---

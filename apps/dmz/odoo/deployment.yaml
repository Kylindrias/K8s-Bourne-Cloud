apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo
  namespace: odoo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: odoo
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: odoo
    spec:
      securityContext:
        fsGroup: 101
      containers:
        - name: odoo
          image: odoo:17.0
          args: ["--init", "base", "--without-demo", "all"]
          ports:
            - containerPort: 8069
            - containerPort: 8072
          env:
            - name: HOST
              valueFrom:
                secretKeyRef:
                  name: odoo-db-app
                  key: host
            - name: USER
              valueFrom:
                secretKeyRef:
                  name: odoo-db-app
                  key: username
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-db-app
                  key: password
          volumeMounts:
            - name: config
              mountPath: /etc/odoo/odoo.conf
              subPath: odoo.conf
            - name: filestore
              mountPath: /var/lib/odoo
      volumes:
        - name: config
          configMap:
            name: odoo-config
        - name: filestore
          persistentVolumeClaim:
            claimName: odoo-filestore
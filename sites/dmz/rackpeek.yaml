apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rackpeek-cert
  namespace: rackpeek
spec:
  secretName: https-rackpeek
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - rackpeek.bourne.cloud
---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: rackpeek-http
  namespace: rackpeek
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`rackpeek.bourne.cloud`)
      kind: Rule
      middlewares:
        - name: redirect-to-https
          namespace: traefik
      services:
        - name: rackpeek
          port: 80
---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: rackpeek-https
  namespace: rackpeek
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`rackpeek.bourne.cloud`)
      kind: Rule
      services:
        - name: rackpeek
          port: 80
  tls:
    secretName: https-rackpeek
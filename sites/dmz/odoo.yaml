apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: odoo-tls
  namespace: odoo
spec:
  secretName: odoo-tls-cert
  issuerRef:
    name: letsencrypt-http        # ← your ClusterIssuer name
    kind: ClusterIssuer
  dnsNames:
    - odoo.wildhunde.com
---
# HTTP → HTTPS redirect
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: odoo-http
  namespace: odoo
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`odoo.wildhunde.com`)
      kind: Rule
      middlewares:
        - name: redirect-to-https
          namespace: traefik
      services:
        - name: odoo
          port: 8069
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: odoo-https
  namespace: odoo
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-http
spec:
  entryPoints:
    - websecure
  tls:
    secretName: odoo-tls-cert     # ← cert-manager managed, not Traefik ACME
  routes:
    - match: Host(`odoo.wildhunde.com`)
      kind: Rule
      services:
        - name: odoo
          port: 8069
    - match: Host(`odoo.wildhunde.com`) && PathPrefix(`/longpolling`)
      kind: Rule
      services:
        - name: odoo
          port: 8072
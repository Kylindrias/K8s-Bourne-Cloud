apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ghost-cert
  namespace: ghost
spec:
  secretName: ghost-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - ghost.bourne.cloud
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ghost
  namespace: ghost
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ghost.bourne.cloud`)
      kind: Rule
      services:
        - name: ghost
          port: 80
  tls:
    secretName: ghost-tls